<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ezra Talks — vis-network</title>
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { display: flex; height: 100vh; font-family: system-ui, sans-serif; overflow: hidden; background: #fff; }
    #graph { flex: 1; position: relative; }
    #overlay {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.82);
      font-size: 15px;
      color: #555;
      letter-spacing: 0.01em;
      z-index: 10;
      pointer-events: none;
    }
    #overlay.active { display: flex; }
    #panel {
      width: 300px;
      border-left: 1px solid #e0e0e0;
      display: flex;
      flex-direction: column;
      background: #fafafa;
      flex-shrink: 0;
    }
    #panel-header { padding: 12px; border-bottom: 1px solid #e0e0e0; background: #f2f2f2; }
    #layout-toggle {
      width: 100%;
      padding: 8px;
      cursor: pointer;
      background: #222;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      margin-bottom: 8px;
      transition: background 0.15s;
    }
    #layout-toggle:hover { background: #444; }
    #search {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
      outline: none;
    }
    #search:focus { border-color: #888; }
    #panel-content { flex: 1; overflow-y: auto; padding: 16px; }
    #placeholder { color: #bbb; font-size: 13px; text-align: center; margin-top: 48px; }
    #detail { display: none; }
    #detail h3 { font-size: 14px; font-weight: 600; margin-bottom: 8px; line-height: 1.45; }
    .meta { font-size: 12px; color: #777; margin-bottom: 10px; line-height: 1.6; }
    .topic-badge {
      display: inline-block;
      padding: 2px 9px;
      background: #e6e6e6;
      border-radius: 10px;
      font-size: 11px;
      color: #555;
      margin-bottom: 12px;
    }
    .abstract { font-size: 13px; line-height: 1.65; color: #333; }
    .video-link {
      display: none;
      margin-top: 14px;
      padding: 6px 14px;
      background: #c41230;
      color: #fff;
      text-decoration: none;
      border-radius: 4px;
      font-size: 13px;
    }
    .video-link:hover { background: #a00f27; }
    #legend {
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid #e0e0e0;
    }
    #legend h4 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: #999; margin-bottom: 8px; }
    .legend-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 6px;
      font-size: 12px;
      color: #444;
      line-height: 1.4;
    }
    .legend-swatch {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 1px;
    }
  </style>
</head>
<body>
  <div id="graph">
    <div id="overlay">Stabilizing layout…</div>
  </div>
  <div id="panel">
    <div id="panel-header">
      <button id="layout-toggle">Switch to Force</button>
      <input id="search" type="text" placeholder="Search talks…" autocomplete="off" />
    </div>
    <div id="panel-content">
      <div id="legend" style="display:none">
        <h4>Topics</h4>
      </div>
      <div id="placeholder">Click a node to see talk details</div>
      <div id="detail">
        <h3 id="d-title"></h3>
        <div class="meta">
          <strong id="d-speaker"></strong><br>
          <span id="d-date"></span>
        </div>
        <span id="d-topic" class="topic-badge"></span>
        <p id="d-abstract" class="abstract"></p>
        <a id="d-video" class="video-link" href="#" target="_blank" rel="noopener noreferrer">Watch video</a>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
